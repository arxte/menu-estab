version: '3'

services:
  nginx:
    image: nginx:latest
    ports:
      - 5173:5173
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - front-menu-estab
      - back-menu-estab
  front-menu-estab:
    build: ./front
    restart: always
  back-menu-estab:
    build: ./back
    restart: always
    depends_on:
      - db
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: passForMongo
  db:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: passForMongo